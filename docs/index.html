<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crossect News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <script>
      (function () {
        var stored = localStorage.getItem("cn-theme");
        var system = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", stored || system);
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=20260527-fix-paths">
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div class="container">
          <div class="top-bar">
            <p id="dateline" class="date mono">Daily Source Digest</p>
            <div class="wordmark" aria-label="Crossect News">Cross<span class="dot"></span>ect <em>News</em></div>
            <div class="top-actions">
              <button id="refreshButton" class="icon-btn" type="button" title="Refresh digest" aria-label="Refresh digest">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 12a9 9 0 0 1-15.36 6.36M3 12A9 9 0 0 1 18.36 5.64"/>
                  <path d="M21 4v6h-6M3 20v-6h6"/>
                </svg>
              </button>
              <button id="themeToggle" class="icon-btn" type="button" title="Toggle theme" aria-label="Toggle theme"></button>
            </div>
          </div>

          <div id="sectionTabs" class="nav-strip" aria-label="Sections"></div>
          <div class="marquee" aria-label="Digest ticker">
            <div id="ticker" class="marquee-inner"></div>
          </div>
        </div>
      </header>

      <main>
        <div class="container">
          <section id="hero" class="hero" aria-label="Lead story"></section>

          <div class="section-head">
            <div>
              <p class="section-eyebrow">Top Stories</p>
              <h1 class="section-title">The morning, cross-sectioned</h1>
            </div>
            <p id="digestSummary" class="section-link">Loading digest</p>
          </div>

          <div class="layout-2col">
            <section class="content" aria-label="Story list">
              <div id="storyList" class="stories-grid"></div>
            </section>

            <aside class="rail" aria-label="Digest controls">
              <section class="rail-card digest-card">
                <p class="panel-label">Digest</p>
                <h2 id="digestTitle">Loading</h2>
                <p id="digestDate" class="muted">Preparing dashboard</p>
                <select id="digestSelect" class="digest-select" aria-label="Digest date"></select>
              </section>

              <section class="rail-card stats-grid" aria-label="Digest totals">
                <div>
                  <span id="storyCount">0</span>
                  <small>Stories</small>
                </div>
                <div>
                  <span id="sourceCount">0</span>
                  <small>Sources</small>
                </div>
                <div>
                  <span id="sectionCount">0</span>
                  <small>Sections</small>
                </div>
              </section>

              <section class="rail-card">
                <h3>Coverage <span class="badge">Sources</span></h3>
                <div id="biasMix" class="bias-mix"></div>
              </section>

              <section class="rail-card controls">
                <h3>Refine <span class="badge">Live</span></h3>
                <label>
                  <span>Search</span>
                  <input id="searchInput" type="search" placeholder="story, outlet, topic">
                </label>
                <label>
                  <span>Section</span>
                  <select id="sectionFilter"></select>
                </label>
                <label>
                  <span>Bias</span>
                  <select id="biasFilter"></select>
                </label>
                <label>
                  <span>Confidence</span>
                  <select id="confidenceFilter"></select>
                </label>
              </section>
            </aside>
          </div>
        </div>
      </main>

      <footer>
        <div class="container footer-bottom">
          <span>Crossect News</span>
          <span class="mono">Daily source-balanced digest</span>
        </div>
      </footer>
    </div>

    <script src="app.js?v=20260527-fix-paths"></script>
  </body>
</html>
